<div class="login-container">
  <div class="banner-card">
    <!-- ใส่รูป banner ที่นี่ -->
    <img src="assets/banner-login.jpg" alt="Banner" />
  </div>
  <div class="login-section">
    <div class="login-card">
      <div class="login-header">
        <h1>LIVLINK Backoffice</h1>
        <p>Please sign in to your account</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" formControlName="email" placeholder="Enter your email"
            [class.error]="getFieldError('email')" (input)="checkThaiInput('email', $event)" />
          <div class="warning-message" *ngIf="thaiWarning.email">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
              <line x1="12" y1="9" x2="12" y2="13"></line>
              <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
            กรุณาเปลี่ยนภาษาเป็นอังกฤษ (กด Shift หรือ Caps Lock)
          </div>
          <div class="error-message" *ngIf="getFieldError('email')">
            {{ getFieldError("email") }}
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-input-wrapper">
            <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password"
              placeholder="Enter your password" [class.error]="getFieldError('password')"
              (input)="checkThaiInput('password', $event)" />
            <button type="button" class="password-toggle-btn" (click)="togglePasswordVisibility()" tabindex="-1">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                </path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <div class="warning-message" *ngIf="thaiWarning.password">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
              <line x1="12" y1="9" x2="12" y2="13"></line>
              <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
            กรุณาเปลี่ยนภาษาเป็นอังกฤษ (กด Shift หรือ Caps Lock)
          </div>
          <div class="error-message" *ngIf="getFieldError('password')">
            {{ getFieldError("password") }}
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-container">
            <input type="checkbox" />
            <span class="checkmark"></span>
            Remember me
          </label>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="login-button" [disabled]="isLoading" [class.loading]="isLoading">
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading">Signing In...</span>
        </button>

        <!-- <div class="form-footer">
          <p>Don't have an account? <a routerLink="/register" class="link-text">Register here</a></p>
        </div> -->
      </form>
    </div>
  </div>

</div>
