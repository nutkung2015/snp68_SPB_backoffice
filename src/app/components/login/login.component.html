<div class="login-container">
  <div class="banner-card">
    <!-- ใส่รูป banner ที่นี่ -->
    <img src="assets/banner-login.jpg" alt="Banner" />
  </div>
  <div class="login-section">
    <div class="login-card">
      <div class="login-header">
        <h1>SNP68 SPB Backoffice</h1>
        <p>Please sign in to your account</p>
      </div>
  
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            formControlName="email"
            placeholder="Enter your email"
            [class.error]="getFieldError('email')"
          />
          <div class="error-message" *ngIf="getFieldError('email')">
            {{ getFieldError("email") }}
          </div>
        </div>
  
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            formControlName="password"
            placeholder="Enter your password"
            [class.error]="getFieldError('password')"
          />
          <div class="error-message" *ngIf="getFieldError('password')">
            {{ getFieldError("password") }}
          </div>
        </div>
  
        <div class="form-options">
          <label class="checkbox-container">
            <input type="checkbox" />
            <span class="checkmark"></span>
            Remember me
          </label>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>
  
        <button
          type="submit"
          class="login-button"
          [disabled]="isLoading"
          [class.loading]="isLoading"
        >
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading">Signing In...</span>
        </button>
      </form>
    </div>
  </div>

</div>
