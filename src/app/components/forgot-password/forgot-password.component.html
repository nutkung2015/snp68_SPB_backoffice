<div class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="w-full max-w-md p-6 bg-white rounded-lg shadow-md">
        <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">Forgot Password</h2>

        <mat-stepper [linear]="isLinear" #stepper>
            <!-- Step 1: Phone Number -->
            <mat-step [stepControl]="phoneForm">
                <ng-template matStepLabel>Phone Number</ng-template>
                <form [formGroup]="phoneForm" class="flex flex-col gap-4 mt-4">
                    <mat-form-field appearance="outline">
                        <mat-label>Phone Number</mat-label>
                        <input matInput formControlName="phone" placeholder="0812345678" maxlength="10">
                        <mat-icon matSuffix>phone</mat-icon>
                        <mat-error *ngIf="phoneForm.get('phone')?.hasError('required')">
                            Phone number is required
                        </mat-error>
                        <mat-error *ngIf="phoneForm.get('phone')?.hasError('pattern')">
                            Invalid phone number format
                        </mat-error>
                    </mat-form-field>

                    <div id="recaptcha-container"></div>

                    <div class="flex justify-end">
                        <button mat-flat-button color="primary" [disabled]="phoneForm.invalid || isLoading"
                            (click)="onSendOTP()">
                            {{ isLoading ? 'Sending...' : 'Send OTP' }}
                        </button>
                        <button mat-button color="primary" matStepperNext [disabled]="!confirmationResult"
                            class="hidden" id="nextStep1"></button>
                    </div>
                </form>
            </mat-step>

            <!-- Step 2: OTP Verification -->
            <mat-step [stepControl]="otpForm">
                <ng-template matStepLabel>Verify OTP</ng-template>
                <form [formGroup]="otpForm" class="flex flex-col gap-4 mt-4">
                    <p class="text-sm text-gray-600">Enter the 6-digit code sent to your phone.</p>

                    <mat-form-field appearance="outline">
                        <mat-label>OTP Code</mat-label>
                        <input matInput formControlName="otp" placeholder="123456" maxlength="6">
                        <mat-icon matSuffix>lock</mat-icon>
                        <mat-error *ngIf="otpForm.get('otp')?.hasError('required')">
                            OTP is required
                        </mat-error>
                        <mat-error *ngIf="otpForm.get('otp')?.hasError('pattern')">
                            OTP must be 6 digits
                        </mat-error>
                    </mat-form-field>

                    <div class="flex justify-between">
                        <button mat-button matStepperPrevious>Back</button>
                        <button mat-flat-button color="primary" [disabled]="otpForm.invalid || isLoading"
                            (click)="onVerifyOTP()">
                            {{ isLoading ? 'Verifying...' : 'Verify & Proceed' }}
                        </button>
                    </div>
                </form>
            </mat-step>
        </mat-stepper>
    </div>
</div>
