<header class="topnav-bar" [class.sidebar-collapsed]="sidebarCollapsed">
  <!-- Left side - Page name -->
  <div class="topnav-left">
    <div class="page-title">
      <span class="page-name">ผู้ดูแลระบบบุคคล</span>
    </div>
  </div>

  <!-- Right side - Notification and Profile -->
  <div class="topnav-right">
    <!-- Notification Icon -->
    <div class="notifications">
      <button class="notification-btn" (click)="toggleNotifications()">
        <span class="material-icons">notifications</span>
        <span class="notification-badge" *ngIf="unreadCount > 0">{{
          unreadCount
          }}</span>
      </button>

      <div class="notification-dropdown" *ngIf="showNotifications">
        <div class="notification-header">
          <h3>การแจ้งเตือน</h3>
          <div class="notification-header-actions">
            <button class="mark-all-read" (click)="markAllAsRead()" *ngIf="unreadCount > 0">
              อ่านทั้งหมด
            </button>
            <button class="dismiss-all-read" (click)="dismissAllRead()" *ngIf="hasReadNotifications">
              <span class="material-icons" style="font-size: 14px; margin-right: 2px;">delete_sweep</span>
              ลบที่อ่านแล้ว
            </button>
          </div>
        </div>
        <div class="notification-list">
          <!-- Empty State -->
          <div *ngIf="notifications.length === 0" class="notification-empty">
            <span class="material-icons empty-icon">notifications_none</span>
            <p>ไม่มีการแจ้งเตือน</p>
          </div>

          <!-- Notification Items -->
          <div *ngFor="let notification of notifications" class="notification-item"
            [class.unread]="!notification.is_read" (click)="onNotificationClick(notification)">
            <div class="notification-icon" [style.background-color]="getNotificationColor(notification.type)">
              <span class="material-icons">{{ getNotificationIcon(notification.type) }}</span>
            </div>
            <div class="notification-content">
              <p class="notification-title">{{ notification.title }}</p>
              <p class="notification-message">{{ notification.body }}</p>
              <span class="notification-time">{{ getTimeAgo(notification.created_at) }}</span>
            </div>
            <div class="notification-dot" *ngIf="!notification.is_read"></div>
            <!-- Delete button for read notifications -->
            <button class="notification-dismiss-btn" *ngIf="notification.is_read"
              (click)="dismissNotification($event, notification)" title="ลบการแจ้งเตือนนี้">
              <span class="material-icons">close</span>
            </button>
          </div>
        </div>
      </div>

    </div>

    <!-- User Profile -->
    <div class="user-menu" (click)="toggleProfileMenu()">
      <div class="user-avatar">
        <span class="avatar-text">{{
          userName | slice : 0 : 2 | uppercase
          }}</span>
      </div>
      <div class="user-info">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role">{{ userRole }}</span>
      </div>

      <!-- Profile Dropdown Menu -->
      <div class="profile-dropdown" *ngIf="showProfileMenu">
        <div class="dropdown-item" (click)="onProfileClick()">Profile</div>
        <div class="dropdown-item logout" (click)="logout()">Logout</div>
      </div>
    </div>
  </div>
</header>
