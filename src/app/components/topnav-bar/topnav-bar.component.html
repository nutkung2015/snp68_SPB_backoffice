<header class="topnav-bar" [class.sidebar-collapsed]="sidebarCollapsed">
  <!-- Left side - Page name -->
  <div class="topnav-left">
    <div class="page-title">
      <span class="page-name">ผู้ดูแลระบบบุคคล</span>
    </div>
  </div>

  <!-- Right side - Notification and Profile -->
  <div class="topnav-right">
    <!-- Notification Icon -->
    <div class="notifications">
      <button class="notification-btn" (click)="toggleNotifications()">
        <span class="material-icons">notifications</span>
        <span class="notification-badge" *ngIf="unreadCount > 0">{{
          unreadCount
        }}</span>
      </button>

      <div class="notification-dropdown" *ngIf="showNotifications">
        <div class="notification-header">
          <h3>Notifications</h3>
          <button class="mark-all-read" (click)="markAllAsRead()">
            Mark all as read
          </button>
        </div>
        <div class="notification-list">
          <div
            *ngFor="let notification of notifications"
            class="notification-item"
            [class.unread]="notification.unread"
            (click)="markAsRead(notification.id)"
          >
            <div class="notification-content">
              <p class="notification-message">{{ notification.message }}</p>
              <span class="notification-time">{{ notification.time }}</span>
            </div>
            <div class="notification-dot" *ngIf="notification.unread"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- User Profile -->
    <div class="user-menu" (click)="toggleProfileMenu()">
      <div class="user-avatar">
        <span class="avatar-text">{{
          userName | slice : 0 : 2 | uppercase
        }}</span>
      </div>
      <div class="user-info">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role">{{ userRole }}</span>
      </div>

      <!-- Profile Dropdown Menu -->
      <div class="profile-dropdown" *ngIf="showProfileMenu">
        <div class="dropdown-item">Profile</div>
        <div class="dropdown-item logout" (click)="logout()">Logout</div>
      </div>
    </div>
  </div>
</header>
