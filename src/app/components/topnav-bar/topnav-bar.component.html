<header class="topnav-bar" [class.sidebar-collapsed]="sidebarCollapsed">
  <div class="topnav-left">
    <button class="menu-toggle">
      <span class="material-icons">menu</span>
    </button>
    <div class="breadcrumb">
      <span class="breadcrumb-item">Dashboard</span>
    </div>
  </div>

  <div class="topnav-right">
    <div class="search-container">
      <div class="search-box">
        <span class="material-icons search-icon">search</span>
        <input type="text" placeholder="Search..." class="search-input">
      </div>
    </div>

    <div class="notifications">
      <button class="notification-btn" (click)="toggleNotifications()">
        <span class="material-icons">notifications</span>
        <span class="notification-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
      </button>
      
      <div class="notification-dropdown" *ngIf="showNotifications">
        <div class="notification-header">
          <h3>Notifications</h3>
          <button class="mark-all-read" (click)="markAllAsRead()">Mark all as read</button>
        </div>
        <div class="notification-list">
          <div 
            *ngFor="let notification of notifications" 
            class="notification-item"
            [class.unread]="notification.unread"
            (click)="markAsRead(notification.id)"
          >
            <div class="notification-content">
              <p class="notification-message">{{ notification.message }}</p>
              <span class="notification-time">{{ notification.time }}</span>
            </div>
            <div class="notification-dot" *ngIf="notification.unread"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="user-menu">
      <div class="user-avatar">
        <span class="avatar-text">AD</span>
      </div>
      <div class="user-info">
        <span class="user-name">Admin01</span>
        <span class="user-role">กรรมการหมู่บ้าน</span>
      </div>
    </div>

    <button class="create-announcement-btn" (click)="onCreateNew()">
      <span class="material-icons">add</span>
      <span>สร้างประกาศใหม่</span>
    </button>
  </div>
</header>
