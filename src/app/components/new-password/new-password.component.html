<div class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="w-full max-w-md p-6 bg-white rounded-lg shadow-md">
        <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">Reset Password</h2>

        <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

            <mat-form-field appearance="outline">
                <mat-label>New Password</mat-label>
                <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
                <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
                    <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                </button>
                <mat-error *ngIf="passwordForm.get('password')?.hasError('required')">
                    Password is required
                </mat-error>
                <mat-error *ngIf="passwordForm.get('password')?.hasError('minlength')">
                    Password must be at least 6 characters
                </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Confirm Password</mat-label>
                <input matInput [type]="hideConfirmPassword ? 'password' : 'text'" formControlName="confirmPassword">
                <button mat-icon-button matSuffix type="button" (click)="hideConfirmPassword = !hideConfirmPassword">
                    <mat-icon>{{hideConfirmPassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                </button>
                <mat-error *ngIf="passwordForm.hasError('notSame')">
                    Passwords do not match
                </mat-error>
            </mat-form-field>

            <button mat-flat-button color="primary" type="submit" [disabled]="passwordForm.invalid || isLoading">
                {{ isLoading ? 'Resetting...' : 'Reset Password' }}
            </button>

        </form>
    </div>
</div>
