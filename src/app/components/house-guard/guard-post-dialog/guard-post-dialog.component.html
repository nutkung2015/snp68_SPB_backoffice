<h2 mat-dialog-title>{{ isEditMode ? 'แก้ไขป้อมยาม' : 'เพิ่มป้อมยามใหม่' }}</h2>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
    <mat-dialog-content>
        <div fxLayout="column" fxLayoutGap="16px">
            <mat-form-field appearance="outline">
                <mat-label>ชื่อป้อมยาม</mat-label>
                <input matInput formControlName="post_name" placeholder="เช่น ป้อมหน้า, ป้อมหลัง" required>
                <mat-error *ngIf="form.get('post_name')?.hasError('required')">กรุณาระบุชื่อป้อมยาม</mat-error>
            </mat-form-field>

            <div fxLayout="row" fxLayoutGap="16px">
                <mat-form-field appearance="outline" fxFlex>
                    <mat-label>เบอร์โทรศัพท์ 1</mat-label>
                    <input matInput formControlName="phone_1" placeholder="0xxxxxx">
                    <mat-icon matSuffix>phone</mat-icon>
                    <mat-error *ngIf="form.get('phone_1')?.hasError('pattern')">เบอร์โทรศัพท์ต้องเป็นตัวเลข 9-15
                        หลัก</mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" fxFlex>
                    <mat-label>เบอร์โทรศัพท์ 2</mat-label>
                    <input matInput formControlName="phone_2" placeholder="0xxxxxx">
                    <mat-icon matSuffix>phone</mat-icon>
                    <mat-error *ngIf="form.get('phone_2')?.hasError('pattern')">เบอร์โทรศัพท์ต้องเป็นตัวเลข 9-15
                        หลัก</mat-error>
                </mat-form-field>
            </div>

            <mat-form-field appearance="outline">
                <mat-label>สถานะ</mat-label>
                <mat-select formControlName="status">
                    <mat-option value="active">ใช้งานปกติ</mat-option>
                    <mat-option value="inactive">ปิดใช้งาน</mat-option>
                </mat-select>
            </mat-form-field>
        </div>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
        <button mat-button type="button" (click)="onCancel()">ยกเลิก</button>
        <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">บันทึก</button>
    </mat-dialog-actions>
</form>
