<div class="dialog-container">
    <div class="warning-icon-wrapper">
        <mat-icon>warning</mat-icon>
    </div>

    <div class="warning-text">
        {{ data.toppic }}
    </div>

    <div class="button-group">
        <button mat-stroked-button class="bt-white" (click)="cancel()">
            {{ data.cancel }}
        </button>
        <button mat-flat-button class="bt-error" (click)="confirm()">
            {{ data.confirm }}
        </button>
    </div>
</div>
